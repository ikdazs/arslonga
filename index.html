<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ars longa 作戦会議</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    background:#FAFAF7;
    min-height:100vh;
    padding:24px 16px 48px;
    max-width:640px;
    margin:0 auto;
    -webkit-font-smoothing:antialiased;
    color:#1a1a1a;
  }

  .header{
    text-align:center;
    margin-bottom:32px;
    padding:32px 16px 28px;
    background:linear-gradient(135deg,#2D5016 0%,#1B3A26 40%,#1A4D6E 100%);
    border-radius:16px;
    color:#fff;
    position:relative;
    overflow:hidden;
  }
  .header::after{
    content:'';position:absolute;top:-20%;right:-8%;
    width:180px;height:180px;border-radius:50%;
    background:rgba(255,255,255,.04);
  }
  .header-sub{font-size:12px;letter-spacing:4px;opacity:.7;margin-bottom:10px;text-transform:uppercase}
  .header h1{font-size:26px;font-weight:700;margin:0 0 8px;line-height:1.4;letter-spacing:.5px}
  .header-note{font-size:13px;opacity:.65;margin-top:10px;line-height:1.6}

  .section-label{
    font-size:11px;font-weight:600;letter-spacing:2px;
    color:#666;margin-bottom:12px;padding-left:4px;
    text-transform:uppercase;
  }

  .page-list{display:flex;flex-direction:column;gap:12px}

  .page-card{
    display:block;
    background:#fff;
    border:1px solid #e0e0dc;
    border-radius:14px;
    padding:18px 20px;
    text-decoration:none;
    color:inherit;
    transition:box-shadow .2s,transform .15s;
    position:relative;
    overflow:hidden;
  }
  .page-card:hover{
    box-shadow:0 4px 18px rgba(0,0,0,.09);
    transform:translateY(-1px);
  }
  .page-card:active{transform:translateY(0)}

  .page-card-accent{
    position:absolute;left:0;top:0;bottom:0;width:4px;
    border-radius:14px 0 0 14px;
  }

  .card-inner{padding-left:12px}
  .card-tag{
    display:inline-block;
    font-size:10px;font-weight:700;letter-spacing:1.5px;
    padding:2px 8px;border-radius:4px;
    margin-bottom:8px;
    text-transform:uppercase;
  }
  .card-title{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:4px}
  .card-desc{font-size:13px;color:#666;line-height:1.6}

  .arrow-icon{
    position:absolute;right:18px;top:50%;transform:translateY(-50%);
    font-size:18px;color:#bbb;
  }

  /* カード個別カラー */
  .card-green .page-card-accent{background:linear-gradient(180deg,#2D5016,#3a6b1e)}
  .card-green .card-tag{background:#f0f7ea;color:#2D5016}

  .card-teal .page-card-accent{background:linear-gradient(180deg,#1B3A26,#2A5A3C)}
  .card-teal .card-tag{background:#e8f4ee;color:#1B3A26}

  .card-blue .page-card-accent{background:linear-gradient(180deg,#1A4D6E,#0D3B54)}
  .card-blue .card-tag{background:#e8f2f8;color:#1A4D6E}

  .footer{
    margin-top:40px;text-align:center;
    font-size:12px;color:#aaa;letter-spacing:1px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">Ars Longa</div>
  <h1>作戦会議</h1>
  <div class="header-note">農地所有適格法人 × 合同会社設立プロジェクト</div>
</div>

<div class="section-label">ドキュメント一覧</div>

<div class="page-list">

  <div class="card-green">
    <a class="page-card" href="flowchart.html">
      <div class="page-card-accent"></div>
      <div class="card-inner">
        <div class="card-tag">フロー</div>
        <div class="card-title">合同会社設立 → 農地所有適格法人フロー</div>
        <div class="card-desc">設立から農地所有適格法人認定までの全体フロー</div>
      </div>
      <span class="arrow-icon">›</span>
    </a>
  </div>

  <div class="card-teal">
    <a class="page-card" href="llc-org-design-guide.html">
      <div class="page-card-accent"></div>
      <div class="card-inner">
        <div class="card-tag">ガイド</div>
        <div class="card-title">合同会社の組織設計ガイド</div>
        <div class="card-desc">農地所有適格法人に対応した組織設計の詳細ガイド</div>
      </div>
      <span class="arrow-icon">›</span>
    </a>
  </div>

  <div class="card-blue">
    <a class="page-card" href="llc-setup-detail.html">
      <div class="page-card-accent"></div>
      <div class="card-inner">
        <div class="card-tag">詳細</div>
        <div class="card-title">合同会社設立の詳細フロー</div>
        <div class="card-desc">設立手続きのステップを詳細に解説したリファレンス</div>
      </div>
      <span class="arrow-icon">›</span>
    </a>
  </div>

</div>

<div class="footer">ars longa, vita brevis</div>

</body>
</html>
